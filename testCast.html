<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cast Demo</title>

  <!-- Google Cast SDK -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Cast Video to TV</h1>

  <!-- Custom Cast Button -->
  <button id="castButton">Cast Video</button>

  <script>
    // Called when Cast SDK is ready
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (isAvailable) {
        initializeCastApi();
      }
    };

    function initializeCastApi() {
      const context = cast.framework.CastContext.getInstance();

      context.setOptions({
        receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
        autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
      });

      // 🎯 EVENT LISTENER (this is the key part)
      context.addEventListener(
        cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
        function(event) {
          if (event.sessionState === cast.framework.SessionState.SESSION_STARTED) {
            castVideo();
          }
        }
      );
    }

    // Button click → opens device picker
    document.getElementById('castButton').addEventListener('click', function() {
      const context = cast.framework.CastContext.getInstance();
      context.requestSession(); // opens device selection
    });

    // Send video to TV
    function castVideo() {
      const session = cast.framework.CastContext.getInstance().getCurrentSession();

      const mediaInfo = new chrome.cast.media.MediaInfo(
        'https://tenrom.github.io/BlindTest/GIMS%20-%20CIEL%20(Clip%20officiel).mp4',
        'video/mp4'
      );

      const request = new chrome.cast.media.LoadRequest(mediaInfo);
      session.loadMedia(request);
    }
  </script>

</body>
</html>
